services:
  - type: web
    name: nirvah-frontend
    env: static
    buildCommand: echo "Static site - no build needed"
    staticPublishPath: ./
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /pages/*
        destination: /pages/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://nirvah-backend.onrender.com
