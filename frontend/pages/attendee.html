<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Dashboard — niRvAG</title>
  <meta name="description" content="niRvAG agent panel: manage assigned tickets, resolve issues, record voice notes." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' }
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      :root {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 240 5.9% 10%;
        --primary-foreground: 0 0% 98%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 240 10% 3.9%;
        --radius: 0.5rem;
      }
      .dark {
        --background: 240 10% 3.9%;
        --foreground: 0 0% 98%;
        --card: 240 10% 3.9%;
        --card-foreground: 0 0% 98%;
        --popover: 240 10% 3.9%;
        --popover-foreground: 0 0% 98%;
        --primary: 0 0% 98%;
        --primary-foreground: 240 5.9% 10%;
        --secondary: 240 3.7% 15.9%;
        --secondary-foreground: 0 0% 98%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%;
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 98%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 240 4.9% 83.9%;
      }
    }
    @layer base {
      * { @apply border-border; }
      body { @apply bg-background text-foreground antialiased tracking-tight h-dvh w-dvw overflow-hidden; }
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    
    .recording-pulse { animation: rec-pulse 2s infinite; }
    @keyframes rec-pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body class="flex bg-muted/30">

  <!-- Sidebar -->
  <aside class="w-64 flex-shrink-0 border-r bg-background flex flex-col hidden md:flex h-full">
    <div class="h-14 flex items-center gap-2 px-6 border-b font-semibold text-lg">
      <i data-lucide="bot" class="w-8 h-8 rounded bg-primary text-primary-foreground p-1.5 flex items-center justify-center"></i>
      <div class="flex flex-col leading-tight"><span class="text-sm">niRvAG</span><span class="text-[10px] text-muted-foreground uppercase tracking-widest">Agent Panel</span></div>
    </div>
    
    <div class="flex-1 overflow-y-auto px-4 py-6 space-y-6">
      <div class="space-y-1">
        <h4 class="mb-2 px-2 text-xs font-semibold text-muted-foreground uppercase tracking-wider">My Work</h4>
        <button class="sidebar-link w-full flex items-center justify-between rounded-md px-3 py-2 text-sm font-medium transition-all bg-muted text-foreground" data-panel="queue" onclick="showPanel('queue')">
          <div class="flex items-center gap-3"><i data-lucide="inbox" class="w-4 h-4"></i> My Tickets</div>
          <span class="bg-primary text-primary-foreground text-[10px] px-1.5 py-0.5 rounded-full" id="myTicketCount">0</span>
        </button>
        <button class="sidebar-link w-full flex items-center gap-3 rounded-md px-3 py-2 text-sm font-medium transition-all hover:bg-muted hover:text-foreground text-muted-foreground" data-panel="resolved" onclick="showPanel('resolved')">
          <i data-lucide="check-circle-2" class="w-4 h-4"></i> Resolved
        </button>
      </div>
    </div>

    <div class="border-t p-4 flex items-center gap-3 relative group">
      <div class="w-8 h-8 rounded-full bg-secondary flex items-center justify-center font-bold text-xs" id="sidebarAvatarA">A</div>
      <div class="flex flex-col flex-1 overflow-hidden">
        <span class="text-sm font-medium truncate" id="sidebarUserNameA">Agent</span>
        <span class="text-xs text-muted-foreground truncate" id="sidebarUserEmailA">agent@nirvag.com</span>
      </div>
      <button onclick="handleLogoutAttendee()" class="text-muted-foreground hover:text-foreground transition absolute right-4 opacity-0 group-hover:opacity-100 bg-background p-1 rounded-md" aria-label="Logout" title="Logout">
        <i data-lucide="log-out" class="w-4 h-4"></i>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-full overflow-hidden">
    
    <!-- Top Bar -->
    <header class="h-14 border-b bg-background flex items-center justify-between px-6 flex-shrink-0">
      <div>
        <h2 class="text-sm font-semibold">Agent Dashboard</h2>
      </div>
      <div class="flex items-center gap-4">
        <button onclick="toggleTheme()" class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground h-9 w-9">
          <i data-lucide="moon" id="themeIcon" class="w-4 h-4"></i>
        </button>
      </div>
    </header>

    <!-- Page Content Container -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 scrollbar-hide">
      
      <!-- Ticket Queue Panel -->
      <div class="panel block" id="panel-queue">
        <div class="mb-8 flex items-end justify-between">
          <div>
            <h1 class="text-3xl font-bold tracking-tight">My Ticket Queue</h1>
            <p class="text-muted-foreground">Tickets assigned to you, automatically sorted by priority.</p>
          </div>
          <button class="inline-flex items-center justify-center rounded-md text-sm font-medium transition-colors border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-4" onclick="loadMyTickets()">
            <i data-lucide="refresh-cw" class="w-4 h-4 mr-2"></i> Refresh
          </button>
        </div>

        <div id="ticketQueueList" class="max-w-4xl space-y-4">
          <div class="text-center text-muted-foreground p-12">
            <i data-lucide="loader-2" class="w-8 h-8 mx-auto animate-spin mb-4"></i>
            Loading tickets...
          </div>
        </div>
      </div>

      <!-- Resolved Panel -->
      <div class="panel hidden" id="panel-resolved">
        <div class="mb-8">
          <h1 class="text-3xl font-bold tracking-tight">Resolved Tickets</h1>
          <p class="text-muted-foreground">Tickets you've successfully resolved.</p>
        </div>

        <div id="resolvedTicketsList" class="max-w-4xl space-y-4">
           <div class="text-center text-muted-foreground p-12">Loading...</div>
        </div>
      </div>

    </main>
  </div>

  <!-- Ticket Detail Modal -->
  <div id="attendeeTicketModal" class="hidden fixed inset-0 z-50 bg-background/80 backdrop-blur-sm data-[state=open]:animate-in data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=open]:fade-in-0 flex items-center justify-center p-4">
    <div class="w-full max-w-2xl max-h-[90vh] overflow-y-auto rounded-xl border bg-card text-card-foreground shadow-lg flex flex-col relative outline-none scrollbar-hide">
      <div class="p-6 pb-4 flex flex-col space-y-1.5 border-b sticky top-0 bg-card z-10">
        <h3 class="font-semibold leading-none tracking-tight flex items-center gap-2" id="attTicketTitle">Ticket Details</h3>
        <button onclick="closeAttModal()" class="absolute right-4 top-4 rounded-sm opacity-70 hover:opacity-100"><i data-lucide="x" class="h-4 w-4"></i></button>
      </div>
      <div id="attTicketContent" class="p-6">
        <!-- Dynamic content injected here via JS -->
      </div>
    </div>
  </div>

  <div class="toast-container fixed top-4 right-4 z-[100] flex flex-col gap-2" id="toastContainer"></div>

  <script src="../js/api.js"></script>
  <script src="../js/attendee.js"></script>
  <script>
    lucide.createIcons();
    const saved = localStorage.getItem('nirvag_theme') || 'light';
    if (saved === 'dark') {
      document.documentElement.classList.add('dark');
      document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
    }
    lucide.createIcons();
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      if (isDark) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('nirvag_theme', 'light');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'moon');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('nirvag_theme', 'dark');
        document.getElementById('themeIcon').setAttribute('data-lucide', 'sun');
      }
      lucide.createIcons();
    }
  </script>
</body>
</html>
